<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inscription — Stage Sportif</title>
<style>
  :root{
    --bg:#050508;--s1:#0a0a10;--s2:#0f0f18;--s3:#151520;--s4:#1a1a28;
    --ac:#6c63ff;--ac2:#8b85ff;--ac3:#b0acff;
    --cyan:#00d4ff;--green:#00ff88;--rose:#ff6b9d;--gold:#f2a516;
    --border:rgba(108,99,255,0.18);--border2:rgba(108,99,255,0.32);
    --text:#f0eeff;--t2:#a8a2d6;--t3:#6b6790;--r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,'Segoe UI',sans-serif;background:radial-gradient(1200px 600px at 50% -10%,rgba(108,99,255,0.18),transparent),var(--bg);color:var(--text);line-height:1.55;min-height:100vh;padding:0 0 60px;}
  .wrap{max-width:760px;margin:0 auto;padding:0 18px;}
  header.hero{background:linear-gradient(135deg,#2a1daa,#6c63ff);padding:30px 18px 26px;text-align:center;border-radius:0 0 28px 28px;box-shadow:0 10px 40px rgba(108,99,255,0.25);}
  .hero .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:rgba(255,255,255,0.18);color:#fff;padding:5px 14px;border-radius:20px;margin-bottom:12px;}
  .hero h1{font-size:26px;color:#fff;line-height:1.2;}
  .hero .sub{color:rgba(255,255,255,0.9);font-size:14px;margin-top:8px;}
  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--ac3);margin:26px 0 12px;}
  .stages{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .stage{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
  .stage h3{font-size:16px;color:var(--text);margin-bottom:4px;}
  .stage .dates{font-size:13px;color:var(--cyan);margin-bottom:8px;}
  .stage .prix{display:inline-block;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,#3a2bcc,var(--ac));padding:4px 12px;border-radius:20px;margin-bottom:10px;}
  .stage ul{list-style:none;}
  .stage li{font-size:13px;color:var(--t2);padding:3px 0 3px 16px;position:relative;}
  .stage li::before{content:'▸';position:absolute;left:0;color:var(--ac2);}
  .infos{background:rgba(108,99,255,0.08);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--t2);margin-top:16px;}
  .tarifs{background:rgba(242,165,22,0.1);border:1px solid rgba(242,165,22,0.4);border-radius:var(--r);padding:14px 16px;margin-top:16px;}
  .tarifs-t{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;}
  .tarifs-table{width:100%;border-collapse:collapse;font-size:13px;}
  .tarifs-table th{font-size:11px;text-transform:uppercase;letter-spacing:0.03em;color:var(--gold);text-align:left;padding:6px 8px;border-bottom:1px solid rgba(242,165,22,0.4);}
  .tarifs-table td{padding:7px 8px;border-bottom:1px solid rgba(242,165,22,0.16);color:var(--text);vertical-align:middle;}
  .tarifs-table .t-n{text-align:center;color:var(--t2);width:48px;font-weight:700;}
  .tarifs-table .t-a{text-align:center;white-space:nowrap;font-weight:700;color:#ffd98a;width:90px;}
  .tarifs-table th:first-child{text-align:center;}
  .tarifs-table th:last-child{text-align:center;}
  .notice{background:rgba(242,165,22,0.12);border:1px solid rgba(242,165,22,0.4);color:#ffd98a;border-radius:var(--r);padding:12px 16px;font-size:13px;margin-top:16px;}
  form{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-top:14px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;flex:1;min-width:140px;}
  label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--t3);font-weight:700;}
  input,select,textarea{background:var(--s1);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 12px;font-size:15px;font-family:inherit;width:100%;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(108,99,255,0.2);}
  .child-card{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:16px 16px 4px;margin-bottom:14px;position:relative;}
  .child-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .child-head .ct{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--ac2);}
  .child-rm{background:none;border:1px solid var(--border);color:var(--t2);padding:5px 11px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;}
  .child-rm:hover{border-color:var(--rose);color:var(--rose);}
  .add-child{width:100%;background:rgba(108,99,255,0.1);border:1px dashed var(--border2);color:var(--ac3);padding:12px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:18px;}
  .add-child:hover{background:rgba(108,99,255,0.18);}
  .check{display:flex;gap:10px;align-items:flex-start;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:16px;}
  .check input{width:20px;height:20px;flex-shrink:0;margin-top:1px;}
  .check label{text-transform:none;letter-spacing:0;font-size:13px;color:var(--t2);font-weight:400;}
  button.submit{width:100%;background:linear-gradient(135deg,#3a2bcc,var(--ac));border:none;color:#fff;padding:15px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(108,99,255,0.35);}
  button.submit:hover{filter:brightness(1.08);}
  button.submit:disabled{opacity:0.6;cursor:wait;}
  .mini{background:none;border:1px solid var(--border);color:var(--t2);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:10px;}
  .done{background:var(--s2);border:1px solid var(--green);border-radius:var(--r);padding:28px 22px;text-align:center;margin-top:20px;}
  .done .big{font-size:48px;}
  .done h2{color:var(--green);margin:10px 0;}
  .done .recap{text-align:left;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px;margin:14px 0;font-size:14px;white-space:pre-wrap;}
  .lock{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);padding:30px 22px;text-align:center;margin-top:14px;}
  .lock .lock-ic{font-size:46px;}
  .lock h2{color:var(--gold);margin:8px 0;font-size:20px;}
  .countdown{font-family:'DM Mono',monospace;font-size:26px;font-weight:700;color:var(--text);background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px 10px;margin:16px auto 0;max-width:340px;letter-spacing:0.04em;}
  .err{color:var(--rose);font-size:13px;margin-top:8px;display:none;}
  footer{text-align:center;color:var(--t3);font-size:12px;margin-top:30px;}
  @media(max-width:560px){.stages{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header class="hero">
  <div class="tag">Inscription en ligne · places limitées</div>
  <h1 id="h-titre">Stage Sportif</h1>
  <div class="sub" id="h-sub"></div>
</header>

<div class="wrap" id="content"></div>

<script>
function decodePayload(){
  const p = new URLSearchParams(location.search).get('d');
  if(!p) return null;
  try {
    const b64 = p.replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  } catch(e){ return null; }
}
function fmtDate(d){ if(!d) return ''; try{ return new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}); }catch(e){ return d; } }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

const data = decodePayload();
const content = document.getElementById('content');
const stages = (data && data.s) || [];
const CLASSES = ['TPS','PS','MS','GS','CP','CE1','CE2','CM1','CM2'];
let childCount = 0;

function stageOptions(allowNone){
  return (allowNone?'<option value="">— aucun (pas de secours) —</option>':'<option value="">— choisir —</option>')
    + stages.map(s=>`<option value="${esc(s.i)}">${esc(s.n)}</option>`).join('');
}
function classeOptions(){
  return '<option value="">— classe —</option>' + CLASSES.map(c=>`<option value="${c}">${c}</option>`).join('');
}
function tarifsHtml(){
  const lines = (data && data.gt ? data.gt : '').split(/\n|;/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return '';
  const rows = lines.map((line,i)=>{
    const ci = line.indexOf(':');
    const label = ci>=0 ? line.slice(0,ci).trim() : line;
    const amount = ci>=0 ? line.slice(ci+1).trim() : '';
    return `<tr><td class="t-n">${i+1}</td><td>${esc(label)}</td><td class="t-a">${esc(amount)}</td></tr>`;
  }).join('');
  return `<div class="tarifs">
    <div class="tarifs-t">💶 Tarifs par enfant — selon le revenu fiscal de référence</div>
    <table class="tarifs-table">
      <thead><tr><th>Choix</th><th>Revenu fiscal de référence du ménage</th><th>Somme par enfant</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function childCardHtml(){
  const n = ++childCount;
  return `
    <div class="child-card" data-child="${n}">
      <div class="child-head">
        <span class="ct">👦 Enfant ${n}</span>
        <button type="button" class="child-rm" onclick="removeChild(${n})" ${n===1?'style="display:none;"':''}>✕ Retirer</button>
      </div>
      <div class="row">
        <div class="fg"><label>Nom de l'enfant *</label><input class="c-nom" required/></div>
        <div class="fg"><label>Prénom de l'enfant *</label><input class="c-prenom" required/></div>
      </div>
      <div class="row">
        <div class="fg" style="min-width:160px;"><label>Date de naissance</label><input class="c-naiss" type="date"/></div>
        <div class="fg"><label>Classe</label><select class="c-classe">${classeOptions()}</select></div>
      </div>
      <div class="row">
        <div class="fg"><label>Choix 1 (prioritaire) *</label><select class="c-c1" required>${stageOptions(false)}</select></div>
        <div class="fg"><label>Choix 2 (secours)</label><select class="c-c2">${stageOptions(true)}</select></div>
      </div>
      <div class="fg"><label>Remarques (allergies, PAI, info utile)</label><textarea class="c-notes" rows="2"></textarea></div>
    </div>`;
}

function addChild(){
  document.getElementById('children').insertAdjacentHTML('beforeend', childCardHtml());
}
function removeChild(n){
  const el = document.querySelector(`.child-card[data-child="${n}"]`);
  if(el) el.remove();
  renumberChildren();
}
function renumberChildren(){
  document.querySelectorAll('#children .child-card').forEach((card,i)=>{
    card.querySelector('.ct').textContent = `👦 Enfant ${i+1}`;
    const rm = card.querySelector('.child-rm');
    if(rm) rm.style.display = i===0 ? 'none' : '';
  });
}

function openDate(){ if(!data || !data.o) return null; const d=new Date(data.o); return isNaN(d.getTime())?null:d; }
function isOpen(){ const od=openDate(); return !od || Date.now()>=od.getTime(); }
function fmtOpen(d){ try{ return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})+' à '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''+d; } }
let countdownTimer = null;

function headerBlocks(){
  const stagesHtml = stages.map(s=>`
    <div class="stage">
      <h3>${esc(s.n)}</h3>
      ${(s.d||s.f)?`<div class="dates">du ${fmtDate(s.d)} au ${fmtDate(s.f)}</div>`:'<div class="dates">dates communiquées prochainement</div>'}
      ${s.x?`<div class="prix">${esc(s.x)}</div>`:''}
      ${(s.g&&s.g.length)?`<ul>${s.g.map(g=>`<li>${esc(g)}</li>`).join('')}</ul>`:''}
    </div>`).join('');
  return `
    <div class="section-title">📅 Les semaines proposées</div>
    <div class="stages">${stagesHtml}</div>
    ${tarifsHtml()}
    ${data.i?`<div class="infos"><b>Infos pratiques :</b> ${esc(data.i)}</div>`:''}
    <div class="notice">⚠️ <b>Le nombre de places est strictement limité.</b> Les inscriptions sont enregistrées <b>par ordre d'arrivée</b> : nous vous invitons vivement à finaliser votre demande dès l'ouverture afin de garantir la place de votre enfant. Chaque enfant ne peut être inscrit qu'à <b>une seule</b> semaine ; le <b>choix 2</b> ne sera retenu qu'en cas d'indisponibilité du choix 1. Vous pouvez inscrire <b>plusieurs enfants</b>.</div>`;
}

function formBlock(){
  const online = !!(data.b && data.wk);
  return `
    <div class="section-title">📝 Formulaire d'inscription</div>
    <form id="form" onsubmit="return false;">
      <div id="children"></div>
      <button type="button" class="add-child" onclick="addChild()">➕ Ajouter un autre enfant</button>

      <div class="section-title" style="margin-top:4px;">👤 Responsable légal</div>
      <div class="row">
        <div class="fg"><label>Nom du responsable *</label><input id="resp" required/></div>
        <div class="fg"><label>Téléphone *</label><input id="tel" type="tel" required/></div>
        <div class="fg"><label>Email *</label><input id="email" type="email" required/></div>
      </div>

      <div class="check">
        <input type="checkbox" id="ok"/>
        <label for="ok">Je comprends que le nombre de places est limité et que les inscriptions sont <b>attribuées par ordre d'arrivée</b>, que chaque enfant ne participera qu'à <b>une seule</b> semaine, et que cette inscription sera <b>confirmée par la mairie</b> selon les places disponibles.</label>
      </div>
      <div class="err" id="err"></div>
      <button class="submit" id="submitBtn" onclick="submitForm()">${online?'✅ Valider mon inscription':'📨 Envoyer mon inscription'}</button>
      ${!online && !data.e?'<div class="notice" style="margin-top:12px;">Après validation, copiez le récapitulatif et transmettez-le à la mairie.</div>':''}
    </form>
    <footer>Vos données ne sont utilisées que pour l'inscription au stage.</footer>`;
}

function lockBlock(){
  const od = openDate();
  return `
    <div class="section-title" style="margin-top:24px;">⏳ Inscriptions à venir</div>
    <div class="lock">
      <div class="lock-ic">🔒</div>
      <h2>Les inscriptions ne sont pas encore ouvertes</h2>
      <p style="color:var(--t2);">Ouverture le <b style="color:var(--text);">${fmtOpen(od)}</b>.</p>
      <div class="countdown" id="countdown">—</div>
      <p style="color:var(--t3);font-size:13px;margin-top:6px;">Gardez ce lien : le formulaire <b>s'activera tout seul</b> à cette date — inutile de revenir avant.</p>
    </div>
    <footer>Vos données ne sont utilisées que pour l'inscription au stage.</footer>`;
}

function startCountdown(){
  const od = openDate(); if(!od) return;
  const tick = ()=>{
    const ms = od.getTime() - Date.now();
    if(ms <= 0){ if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; } renderApp(); return; }
    const tot = Math.floor(ms/1000);
    const d=Math.floor(tot/86400), h=Math.floor(tot%86400/3600), m=Math.floor(tot%3600/60), s=tot%60;
    const el = document.getElementById('countdown');
    if(el) el.textContent = (d>0?d+'j ':'') + String(h).padStart(2,'0')+'h ' + String(m).padStart(2,'0')+'m ' + String(s).padStart(2,'0')+'s';
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

function renderApp(){
  document.getElementById('h-titre').textContent = data.t || 'Stage Sportif';
  document.getElementById('h-sub').textContent = [data.l, data.h ? ('Horaires : '+data.h) : ''].filter(Boolean).join('  ·  ');
  if(isOpen()){
    if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
    content.innerHTML = headerBlocks() + formBlock();
    addChild(); // premier enfant par défaut
  } else {
    content.innerHTML = headerBlocks() + lockBlock();
    startCountdown();
  }
}

if(!data){
  content.innerHTML = '<div class="notice" style="margin-top:24px;">Ce lien d\'inscription est incomplet ou invalide. Merci de contacter la mairie pour obtenir le bon lien.</div>';
} else {
  renderApp();
}

function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function nameOf(id){ const s=stages.find(x=>x.i===id); return s?s.n:''; }

// Récupère et valide tous les enfants saisis
function collectChildren(show){
  const cards = [...document.querySelectorAll('#children .child-card')];
  const children = [];
  for(let i=0;i<cards.length;i++){
    const card = cards[i];
    const g = sel => { const e=card.querySelector(sel); return e?e.value.trim():''; };
    const prenom=g('.c-prenom'), nom=g('.c-nom'), c1=g('.c-c1'), c2=g('.c-c2');
    if(!prenom||!nom){ show(`Enfant ${i+1} : merci d'indiquer le prénom et le nom.`); return null; }
    if(!c1){ show(`Enfant ${i+1} : merci de choisir au moins une semaine (choix 1).`); return null; }
    if(c2 && c2===c1){ show(`Enfant ${i+1} : le choix 2 doit être différent du choix 1 (ou laissez « aucun »).`); return null; }
    children.push({ prenom, nom, naissance:g('.c-naiss'), classe:g('.c-classe'), choix1:c1, choix2:c2, notes:g('.c-notes'),
      choix1Nom:nameOf(c1), choix2Nom:c2?nameOf(c2):'' });
  }
  if(children.length===0){ show('Merci d\'ajouter au moins un enfant.'); return null; }
  return children;
}

async function submitForm(){
  const err = document.getElementById('err');
  const show = m => { err.textContent = m; err.style.display='block'; window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); };
  err.style.display='none';
  if(!isOpen()){ show('Les inscriptions ne sont pas encore ouvertes.'); renderApp(); return; }

  const children = collectChildren(show);
  if(!children) return;
  const resp=val('resp'), tel=val('tel'), email=val('email');
  if(!resp||!tel||!email){ show('Merci de renseigner le responsable, le téléphone et l\'email.'); return; }
  if(!document.getElementById('ok').checked){ show('Merci de cocher la case de confirmation.'); return; }

  const familyId = Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const createdAt = new Date().toISOString();
  const records = children.map((c,idx)=>({
    id: familyId+'-'+idx,
    familyId, createdAt,
    prenom:c.prenom, nom:c.nom, naissance:c.naissance, classe:c.classe,
    choix1:c.choix1, choix2:c.choix2, choix1Nom:c.choix1Nom, choix2Nom:c.choix2Nom,
    resp, tel, email, notes:c.notes
  }));

  const recap = buildRecap(children, resp, tel, email);
  const subject = `Inscription stage sportif — ${resp} (${children.length} enfant${children.length>1?'s':''})`;

  // 1) Base en ligne configurée : on envoie directement (plus d'email).
  // NB : on passe par une requête GET (et non POST) car Apps Script accepte mal
  // le POST cross-origin depuis un navigateur ; le GET, lui, fonctionne de façon fiable.
  if(data.b && data.wk){
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '⏳ Envoi en cours...';
    try {
      const sep = data.b.includes('?') ? '&' : '?';
      const url = data.b + sep + 'action=save&wk=' + encodeURIComponent(data.wk)
        + '&payload=' + encodeURIComponent(JSON.stringify(records));
      await fetch(url, { method:'GET' });
      showDone(true, recap);
      return;
    } catch(e){
      // échec réseau : on bascule sur le repli (copie / email)
      btn.disabled = false; btn.textContent = '📨 Envoyer mon inscription';
      showDone(false, recap, subject, true);
      return;
    }
  }

  // 2) Repli sans base en ligne : email (si configuré) + copie du récapitulatif
  if(data.e){
    window.location.href = `mailto:${data.e}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(recap)}`;
  }
  showDone(false, recap, subject, false);
}

function buildRecap(children, resp, tel, email){
  const lines = [`INSCRIPTION STAGE SPORTIF`, `Responsable: ${resp}`, `Téléphone: ${tel}`, `Email: ${email}`, ``];
  children.forEach((c,i)=>{
    lines.push(`— Enfant ${i+1} : ${c.prenom} ${c.nom}`);
    if(c.naissance) lines.push(`   Né(e) le: ${c.naissance}`);
    if(c.classe) lines.push(`   Classe: ${c.classe}`);
    lines.push(`   Choix 1: ${c.choix1Nom}`);
    lines.push(`   Choix 2: ${c.choix2Nom||'(aucun)'}`);
    if(c.notes) lines.push(`   Remarques: ${c.notes}`);
    lines.push('');
  });
  lines.push(`Envoyé via le formulaire d'inscription en ligne.`);
  return lines.join('\n');
}

function showDone(sentOnline, recap, subject, fallback){
  let msg;
  if(sentOnline){
    msg = 'Votre inscription a bien été <b>enregistrée auprès de la mairie</b>. Aucune autre démarche n\'est nécessaire.';
  } else if(fallback){
    msg = 'La connexion à la base en ligne a échoué. <b>Copiez le récapitulatif</b> ci-dessous et transmettez-le à la mairie'+(data.e?(' (<b>'+esc(data.e)+'</b>)'):'')+'.';
  } else if(data.e){
    msg = 'Votre messagerie vient de s\'ouvrir avec un email pré-rempli : <b>il ne vous reste qu\'à appuyer sur « Envoyer »</b>.<br>Si rien ne s\'est ouvert, copiez le récapitulatif et envoyez-le à <b>'+esc(data.e)+'</b>.';
  } else {
    msg = 'Copiez le récapitulatif ci-dessous et transmettez-le à la mairie.';
  }
  const mailUrl = (subject!==undefined && data.e) ? `mailto:${data.e}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(recap)}` : '';
  content.innerHTML = `
    <div class="done">
      <div class="big">${sentOnline?'🎉':'✅'}</div>
      <h2>${sentOnline?'Inscription enregistrée':'Inscription prête'}</h2>
      <p style="color:var(--t2);">${msg}</p>
      <div class="recap" id="recap">${esc(recap)}</div>
      <button class="mini" onclick="copyRecap()">📋 Copier le récapitulatif</button>
      ${mailUrl?`<button class="mini" onclick="window.location.href='${mailUrl}'">📨 Ouvrir l'email</button>`:''}
      <p style="color:var(--t3);font-size:12px;margin-top:16px;">Votre inscription sera confirmée par la mairie selon les places disponibles, attribuées par ordre d'arrivée.</p>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function copyRecap(){
  const t = document.getElementById('recap').textContent;
  navigator.clipboard.writeText(t).then(()=>{ const b=event.target; b.textContent='✓ Copié !'; setTimeout(()=>b.textContent='📋 Copier le récapitulatif',2000); });
}
</script>
</body>
</html>
