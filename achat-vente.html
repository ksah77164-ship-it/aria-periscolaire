<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6c63ff">
<title>Bénéf' — Acheté / Vendu</title>
<style>
  :root{
    --bg:#050508; --bg2:#0e0e16; --card:#15151f; --card2:#1c1c2a;
    --line:#28283c; --txt:#f4f4f8; --muted:#9a9ab0; --muted2:#6d6d85;
    --accent:#6c63ff; --green:#25c281; --red:#ff5c72;
    --radius:16px; --rsm:12px; font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1000px 500px at 50% -10%,#191932 0%,var(--bg) 60%);
    color:var(--txt);min-height:100vh;line-height:1.4;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:600px;margin:0 auto;padding:18px 15px 60px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .logo{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--accent),#b06cff);
    display:grid;place-items:center;font-weight:800;font-size:1.15rem;color:#fff;flex:0 0 auto}
  h1{font-size:1.3rem;margin:0;font-weight:800;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.8rem}
  .pos{color:var(--green)} .neg{color:var(--red)}

  /* big total */
  .hero{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);
    border-radius:var(--radius);padding:18px;margin-bottom:16px;text-align:center}
  .hero .k{font-size:.78rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .hero .v{font-size:2.6rem;font-weight:800;letter-spacing:-.03em;margin:4px 0 2px;line-height:1}
  .hero .row{display:flex;justify-content:center;gap:26px;margin-top:10px;font-size:.8rem;color:var(--muted)}
  .hero .row b{display:block;color:var(--txt);font-size:1rem;font-weight:700;margin-top:1px}

  /* quick add */
  .add{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:18px}
  .add h2{font-size:.95rem;margin:0 0 11px;font-weight:700}
  .add input{width:100%;font-family:inherit;font-size:1rem;color:var(--txt);background:var(--bg2);
    border:1px solid var(--line);border-radius:var(--rsm);padding:13px 13px;outline:none}
  .add input:focus{border-color:var(--accent)}
  .add .name{margin-bottom:10px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .money-in{position:relative}
  .money-in input{padding-left:30px}
  .money-in .cur{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:.95rem;pointer-events:none}
  .money-in .cap{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:.68rem;font-weight:600;pointer-events:none}
  .btn{width:100%;font-family:inherit;font-size:1rem;font-weight:700;border:none;border-radius:var(--rsm);
    padding:14px;cursor:pointer;background:linear-gradient(135deg,var(--accent),#8a5cff);color:#fff;transition:transform .08s}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:9px 12px;font-size:.82rem;width:auto}
  .btn.danger{background:rgba(255,92,114,.14);color:var(--red);border:1px solid rgba(255,92,114,.35)}
  .addProfit{text-align:center;font-size:.85rem;font-weight:700;height:1.1em;margin-bottom:10px}

  /* list */
  .list-h{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 8px}
  .list-h h2{font-size:.95rem;margin:0;font-weight:700}
  .item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--rsm);padding:12px 13px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
  .item:active{border-color:var(--accent)}
  .it-main{flex:1;min-width:0}
  .it-name{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .it-meta{font-size:.78rem;color:var(--muted);margin-top:2px}
  .it-right{text-align:right;flex:0 0 auto}
  .it-profit{font-weight:800;font-size:1.05rem}
  .badge{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;
    background:rgba(63,169,255,.15);color:#3fa9ff}
  .sellNow{background:var(--green);color:#04120c;border:none;border-radius:20px;font-weight:700;
    font-size:.75rem;padding:6px 11px;cursor:pointer;font-family:inherit;margin-top:5px}
  .empty{text-align:center;color:var(--muted);padding:30px 10px}
  .empty .big{font-size:2.2rem;margin-bottom:6px}
  .foot{display:flex;gap:9px;justify-content:center;margin-top:16px}
  .hint{font-size:.72rem;color:var(--muted2);text-align:center;margin-top:12px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(3,3,8,.72);backdrop-filter:blur(4px);z-index:50;
    display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  @media(min-width:560px){.overlay{align-items:center;padding:20px}}
  .sheet{background:var(--bg2);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:480px;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
  @media(min-width:560px){.sheet{border-radius:22px}}
  .sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .sheet-h h2{margin:0;font-size:1.1rem}
  .x{background:var(--card2);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:50%;
    font-size:1.05rem;cursor:pointer}
  .fld{margin-bottom:12px}
  .fld .lab{font-size:.76rem;color:var(--muted);font-weight:600;margin-bottom:5px;display:block}
  .fld input{width:100%;font-family:inherit;font-size:1rem;color:var(--txt);background:var(--bg2);
    border:1px solid var(--line);border-radius:var(--rsm);padding:12px;outline:none}
  .fld input:focus{border-color:var(--accent)}
  .editProfit{text-align:center;font-weight:800;font-size:1.05rem;margin:8px 0 14px}
  .mrow{display:flex;gap:9px;margin-top:10px}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(24px + env(safe-area-inset-bottom));
    background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:11px 18px;border-radius:30px;
    font-size:.85rem;font-weight:600;z-index:60;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">€</div>
    <div>
      <h1>Bénéf'</h1>
      <div class="sub">Acheté combien · Vendu combien</div>
    </div>
  </header>

  <div class="hero">
    <div class="k">Bénéfice total</div>
    <div class="v" id="totalProfit">0 €</div>
    <div class="row">
      <span>Acheté<b id="totalBuy">0 €</b></span>
      <span>Vendu<b id="totalSell">0 €</b></span>
    </div>
  </div>

  <div class="add">
    <h2>➕ Ajouter</h2>
    <input class="name" id="a-name" placeholder="Nom de l'article" autocomplete="off">
    <div class="two">
      <div class="money-in">
        <span class="cur">€</span><span class="cap">acheté</span>
        <input id="a-buy" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0">
      </div>
      <div class="money-in">
        <span class="cur">€</span><span class="cap">vendu</span>
        <input id="a-sell" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0">
      </div>
    </div>
    <div class="addProfit" id="addProfit"></div>
    <button class="btn" id="addBtn">Ajouter</button>
    <div class="hint" style="margin-top:9px">Laissez « vendu » vide si pas encore vendu.</div>
  </div>

  <div class="list-h">
    <h2 id="listTitle">Mes articles</h2>
  </div>
  <div id="list"></div>

  <div class="foot" id="foot" style="display:none">
    <button class="btn ghost sm" id="exportCsv">⬇︎ Export CSV</button>
    <button class="btn ghost sm" id="exportJson">⬇︎ Sauvegarde</button>
    <button class="btn ghost sm" id="importBtn">⬆︎ Restaurer</button>
    <input type="file" id="importFile" accept="application/json,.json" hidden>
  </div>
  <div class="hint">Données enregistrées sur cet appareil uniquement.</div>
</div>

<!-- edit modal -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-h"><h2>Modifier</h2><button class="x" id="closeModal">✕</button></div>
    <input type="hidden" id="e-id">
    <div class="fld"><span class="lab">Article</span><input id="e-name"></div>
    <div class="two">
      <div class="fld"><span class="lab">Acheté (€)</span><input id="e-buy" type="number" inputmode="decimal" min="0" step="0.01"></div>
      <div class="fld"><span class="lab">Vendu (€)</span><input id="e-sell" type="number" inputmode="decimal" min="0" step="0.01" placeholder="pas encore"></div>
    </div>
    <div class="editProfit" id="editProfit"></div>
    <button class="btn" id="saveBtn">Enregistrer</button>
    <div class="mrow"><button class="btn danger" id="deleteBtn">Supprimer</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const KEY="benef_simple_v1";
  const $=s=>document.querySelector(s);
  const money=n=>(n<0?"-":"")+Math.abs(n).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
  const money0=n=>(n<0?"-":"")+Math.abs(Math.round(n)).toLocaleString("fr-FR")+" €";
  const uid=()=>"i"+Date.now().toString(36)+Math.floor(Math.random()*1e5).toString(36);
  const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const num=v=>{const n=parseFloat(String(v).replace(",","."));return isNaN(n)?null:n;};

  let items=load();
  function load(){try{const r=JSON.parse(localStorage.getItem(KEY));return Array.isArray(r)?r:[];}catch(e){return[];}}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(items));}catch(e){toast("Stockage plein !");}}

  const sold=i=>i.sell!=null && i.sell!=="";
  const profit=i=>sold(i)?(+i.sell)-(+i.buy||0):0;

  function render(){
    const s=items.filter(sold);
    const tProfit=s.reduce((a,i)=>a+profit(i),0);
    const tBuy=items.reduce((a,i)=>a+(+i.buy||0),0);
    const tSell=s.reduce((a,i)=>a+(+i.sell||0),0);
    const tp=$("#totalProfit");
    tp.textContent=(tProfit>=0?"+":"")+money0(tProfit);
    tp.className="v "+(tProfit>=0?"pos":"neg");
    $("#totalBuy").textContent=money0(tBuy);
    $("#totalSell").textContent=money0(tSell);

    const el=$("#list");
    $("#foot").style.display=items.length?"flex":"none";
    $("#listTitle").textContent=items.length?`Mes articles (${items.length})`:"Mes articles";
    if(!items.length){el.innerHTML=`<div class="empty"><div class="big">🧾</div>Aucun article.<br>Ajoutez-en un ci-dessus !</div>`;return;}
    const list=items.slice().sort((a,b)=>(b.created||0)-(a.created||0));
    el.innerHTML=list.map(i=>{
      const p=profit(i);
      if(sold(i)){
        return `<div class="item" data-id="${i.id}">
          <div class="it-main">
            <div class="it-name">${esc(i.name)}</div>
            <div class="it-meta">Acheté ${money(+i.buy||0)} → Vendu ${money(+i.sell)}</div>
          </div>
          <div class="it-right"><div class="it-profit ${p>=0?"pos":"neg"}">${p>=0?"+":""}${money0(p)}</div></div>
        </div>`;
      }
      return `<div class="item" data-id="${i.id}">
        <div class="it-main">
          <div class="it-name">${esc(i.name)}</div>
          <div class="it-meta"><span class="badge">En stock</span> Acheté ${money(+i.buy||0)}</div>
        </div>
        <div class="it-right"><button class="sellNow" data-sell="${i.id}">Vendu ✓</button></div>
      </div>`;
    }).join("");
    el.querySelectorAll(".item").forEach(row=>row.addEventListener("click",e=>{
      if(e.target.classList.contains("sellNow"))return;
      openEdit(row.dataset.id);
    }));
    el.querySelectorAll(".sellNow").forEach(b=>b.addEventListener("click",e=>{
      e.stopPropagation();openEdit(b.dataset.sell,true);
    }));
  }

  /* quick add */
  function addProfitPreview(){
    const b=num($("#a-buy").value),s=num($("#a-sell").value);
    const el=$("#addProfit");
    if(s==null){el.textContent="";return;}
    const p=s-(b||0);
    el.innerHTML=`Bénéfice : <span class="${p>=0?"pos":"neg"}">${p>=0?"+":""}${money(p)}</span>`;
  }
  $("#a-buy").addEventListener("input",addProfitPreview);
  $("#a-sell").addEventListener("input",addProfitPreview);
  function doAdd(){
    const name=$("#a-name").value.trim();
    const b=num($("#a-buy").value);
    const s=num($("#a-sell").value);
    if(!name){toast("Donnez un nom");$("#a-name").focus();return;}
    items.push({id:uid(),created:Date.now(),name,buy:b==null?0:b,sell:s==null?"":s});
    save();render();
    $("#a-name").value="";$("#a-buy").value="";$("#a-sell").value="";addProfitPreview();
    $("#a-name").focus();
    toast("Ajouté ✓");
  }
  $("#addBtn").addEventListener("click",doAdd);
  $("#a-sell").addEventListener("keydown",e=>{if(e.key==="Enter")doAdd();});
  $("#a-name").addEventListener("keydown",e=>{if(e.key==="Enter")$("#a-buy").focus();});

  /* edit */
  function editProfitPreview(){
    const b=num($("#e-buy").value),s=num($("#e-sell").value);
    const el=$("#editProfit");
    if(s==null){el.innerHTML='<span style="color:var(--muted);font-weight:600;font-size:.85rem">Pas encore vendu</span>';return;}
    const p=s-(b||0);
    el.innerHTML=`Bénéfice : <span class="${p>=0?"pos":"neg"}">${p>=0?"+":""}${money(p)}</span>`;
  }
  $("#e-buy").addEventListener("input",editProfitPreview);
  $("#e-sell").addEventListener("input",editProfitPreview);
  function openEdit(id,focusSell){
    const it=items.find(x=>x.id===id);if(!it)return;
    $("#e-id").value=it.id;$("#e-name").value=it.name||"";
    $("#e-buy").value=it.buy??"";$("#e-sell").value=(it.sell===""||it.sell==null)?"":it.sell;
    editProfitPreview();
    $("#overlay").classList.add("show");
    if(focusSell)setTimeout(()=>$("#e-sell").focus(),120);
  }
  function closeEdit(){$("#overlay").classList.remove("show");}
  $("#saveBtn").addEventListener("click",()=>{
    const it=items.find(x=>x.id===$("#e-id").value);if(!it)return;
    const name=$("#e-name").value.trim();
    if(!name){toast("Donnez un nom");return;}
    it.name=name;
    const b=num($("#e-buy").value);it.buy=b==null?0:b;
    const s=num($("#e-sell").value);it.sell=s==null?"":s;
    save();render();closeEdit();toast("Enregistré ✓");
  });
  $("#deleteBtn").addEventListener("click",()=>{
    const id=$("#e-id").value;
    if(confirm("Supprimer cet article ?")){items=items.filter(x=>x.id!==id);save();render();closeEdit();toast("Supprimé");}
  });
  $("#closeModal").addEventListener("click",closeEdit);
  $("#overlay").addEventListener("click",e=>{if(e.target===$("#overlay"))closeEdit();});
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeEdit();});

  /* export / import */
  function download(name,content,type){
    const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=name;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  }
  $("#exportCsv").addEventListener("click",()=>{
    if(!items.length){toast("Rien à exporter");return;}
    const head=["Article","Acheté","Vendu","Bénéfice"];
    const rows=items.map(i=>[i.name,(+i.buy||0).toFixed(2),sold(i)?(+i.sell).toFixed(2):"",sold(i)?profit(i).toFixed(2):""]);
    const csv=[head,...rows].map(r=>r.map(c=>{const s=String(c);return /[";\n,]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(";")).join("\n");
    download("benef.csv","﻿"+csv,"text/csv;charset=utf-8");toast("CSV exporté");
  });
  $("#exportJson").addEventListener("click",()=>{download("benef_sauvegarde.json",JSON.stringify(items,null,2),"application/json");toast("Sauvegarde créée");});
  $("#importBtn").addEventListener("click",()=>$("#importFile").click());
  $("#importFile").addEventListener("change",e=>{
    const f=e.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=ev=>{try{
      const data=JSON.parse(ev.target.result);if(!Array.isArray(data))throw 0;
      if(items.length&&!confirm("Remplacer les "+items.length+" article(s) actuels ?"))return;
      items=data.map(d=>({id:d.id||uid(),created:d.created||Date.now(),name:d.name||"?",buy:+d.buy||0,sell:(d.sell===""||d.sell==null)?"":+d.sell}));
      save();render();toast("Restauré ✓");
    }catch(err){toast("Fichier invalide");}$("#importFile").value="";};
    rd.readAsText(f);
  });

  let tt;
  function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),1800);}

  render();
})();
</script>
</body>
</html>
