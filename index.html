<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARIA — Assistante de Kamélia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #7c6cfa;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,108,250,0.18);
    --text: #f0eeff;
    --text2: #9b96c0;
    --text3: #5c5880;
    --user-bg: #1e1a3a;
    --aria-bg: #13131a;
    --danger: #f87171;
    --success: #6ee7b7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }
  .aria-logo {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, #4f3fe0, #7c6cfa, #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(124,108,250,0.35);
  }
  .aria-info { flex: 1; }
  .aria-name {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .aria-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 1px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px rgba(110,231,183,0.6);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }
  .clear-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text3);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-glow); }

  /* API KEY BAR */
  #apiBar {
    padding: 10px 24px;
    background: rgba(124,108,250,0.08);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #apiBar label { font-size: 12px; color: var(--text3); white-space: nowrap; }
  #apiKey {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #apiKey:focus { border-color: var(--accent); }
  #apiKey::placeholder { color: var(--text3); }
  #saveKey {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  #saveKey:hover { opacity: 0.85; }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* WELCOME */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px 20px;
    gap: 12px;
  }
  .welcome-logo {
    width: 64px;
    height: 64px;
    border-radius: 20px;
    background: linear-gradient(135deg, #4f3fe0, #7c6cfa, #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    box-shadow: 0 0 40px rgba(124,108,250,0.3);
    margin-bottom: 8px;
  }
  .welcome h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .welcome p { font-size: 14px; color: var(--text2); max-width: 320px; line-height: 1.6; }

  /* MESSAGES */
  .msg { display: flex; gap: 10px; max-width: 80%; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.aria { align-self: flex-start; }
  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.aria .msg-avatar {
    background: linear-gradient(135deg, #4f3fe0, #7c6cfa);
    color: #fff;
    font-family: 'Syne', sans-serif;
  }
  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
  }
  .msg-bubble {
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
  }
  .msg.aria .msg-bubble {
    background: var(--aria-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 4px;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,108,250,0.25);
    color: var(--text);
    border-top-right-radius: 4px;
  }
  .msg-time { font-size: 11px; color: var(--text3); margin-top: 4px; padding: 0 4px; }
  .msg.user .msg-time { text-align: right; }

  /* TYPING */
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* SUGGESTIONS */
  #suggestions {
    padding: 0 24px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 7px 13px;
    border-radius: 20px;
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .suggestion:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-glow); }

  /* INPUT */
  #inputArea {
    padding: 14px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #userInput::placeholder { color: var(--text3); }
  #sendBtn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
  }
  #sendBtn:hover { opacity: 0.85; }
  #sendBtn:active { transform: scale(0.93); }
  #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }
  #sendBtn svg { width: 16px; height: 16px; fill: #fff; }
  .input-hint { font-size: 11px; color: var(--text3); margin-top: 7px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="aria-logo">ARIA</div>
  <div class="aria-info">
    <div class="aria-name">ARIA</div>
    <div class="aria-sub">Assistante de Kamélia · Mairie</div>
  </div>
  <div class="status-dot" title="En ligne"></div>
  <button class="clear-btn" onclick="clearChat()">Effacer</button>
</header>

<div id="apiBar">
  <label>Clé API Anthropic</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
  <button id="saveKey" onclick="saveApiKey()">Enregistrer</button>
</div>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-logo">ARIA</div>
    <h1>Bonjour Kamélia 👋</h1>
    <p>Je suis ARIA, votre assistante dédiée. Entrez votre clé API puis posez-moi votre première question.</p>
  </div>
</div>

<div id="suggestions">
  <button class="suggestion" onclick="useSuggestion(this)">📧 Rédiger un email</button>
  <button class="suggestion" onclick="useSuggestion(this)">📋 Résumer un document</button>
  <button class="suggestion" onclick="useSuggestion(this)">🗓️ Préparer un courrier officiel</button>
  <button class="suggestion" onclick="useSuggestion(this)">✅ Créer une liste de tâches</button>
</div>

<div id="inputArea">
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Posez votre question à ARIA..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">Entrée pour envoyer · Maj+Entrée pour nouvelle ligne</div>
</div>

<script>
const SYSTEM_PROMPT = `Tu es ARIA, l'assistante personnelle de Kamélia. Tu travailles pour la mairie de Ferrières-en-Brie et tu aides Kamélia dans toutes ses tâches administratives et professionnelles.

Règles importantes :
- Tu réponds TOUJOURS en français, quoi qu'il arrive.
- Tu es professionnelle, efficace, et bienveillante.
- Tu connais le contexte mairie : correspondance officielle, périscolaire, gestion administrative.
- Quand tu rédiges des courriers ou emails officiels, tu respectes les formules administratives françaises.
- Tu es concise mais complète. Tu n'inventes pas de faits.
- Tu t'adresses toujours à Kamélia avec respect et chaleur.`;

let history = JSON.parse(localStorage.getItem('aria-history') || '[]');
let apiKey = localStorage.getItem('aria-key') || '';

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const apiKeyEl = document.getElementById('apiKey');
const welcomeEl = document.getElementById('welcome');

if (apiKey) {
  apiKeyEl.value = apiKey;
  sendBtn.disabled = false;
  document.getElementById('apiBar').style.background = 'rgba(110,231,183,0.05)';
}

function saveApiKey() {
  apiKey = apiKeyEl.value.trim();
  if (!apiKey) return;
  localStorage.setItem('aria-key', apiKey);
  sendBtn.disabled = false;
  document.getElementById('apiBar').style.background = 'rgba(110,231,183,0.05)';
  const btn = document.getElementById('saveKey');
  btn.textContent = '✓ Enregistré';
  setTimeout(() => { btn.textContent = 'Enregistrer'; }, 2000);
}

function now() {
  return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function appendMsg(role, text) {
  if (welcomeEl) welcomeEl.style.display = 'none';
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'aria' ? 'AR' : 'K';

  const right = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = now();

  right.appendChild(bubble);
  right.appendChild(time);
  wrapper.appendChild(avatar);
  wrapper.appendChild(right);
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function showTyping() {
  if (welcomeEl) welcomeEl.style.display = 'none';
  const wrapper = document.createElement('div');
  wrapper.className = 'msg aria';
  wrapper.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'AR';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !apiKey) return;

  inputEl.value = '';
  autoResize(inputEl);
  sendBtn.disabled = true;

  appendMsg('user', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.error) {
      appendMsg('aria', `❌ Erreur : ${data.error.message}`);
    } else {
      const reply = data.content[0].text;
      appendMsg('aria', reply);
      history.push({ role: 'assistant', content: reply });
      localStorage.setItem('aria-history', JSON.stringify(history.slice(-40)));
    }
  } catch (e) {
    removeTyping();
    appendMsg('aria', '❌ Impossible de joindre l\'API. Vérifiez votre clé et votre connexion.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function clearChat() {
  history = [];
  localStorage.removeItem('aria-history');
  messagesEl.innerHTML = '';
  welcomeEl.style.display = 'flex';
  messagesEl.appendChild(welcomeEl);
}

function useSuggestion(btn) {
  inputEl.value = btn.textContent.slice(2).trim();
  inputEl.focus();
  autoResize(inputEl);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  sendBtn.disabled = !el.value.trim() || !apiKey;
}

// Restore history
if (history.length > 0) {
  welcomeEl.style.display = 'none';
  history.forEach(m => {
    appendMsg(m.role === 'user' ? 'user' : 'aria', m.content);
  });
}

apiKeyEl.addEventListener('keydown', e => { if (e.key === 'Enter') saveApiKey(); });
</script>
</body>
</html>
