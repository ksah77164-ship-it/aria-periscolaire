<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — Mairie de Ferrières-en-Brie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#050508;--s1:#0a0a10;--s2:#0f0f18;--s3:#151520;--s4:#1a1a28;
  --ac:#6c63ff;--ac2:#8b85ff;--ac3:#b0acff;--ac4:#d4d2ff;
  --cyan:#00d4ff;--rose:#ff6b9d;--gold:#ffd700;--green:#00ff88;
  --glow:rgba(108,99,255,0.3);--glow2:rgba(108,99,255,0.08);
  --border:rgba(108,99,255,0.15);--border2:rgba(108,99,255,0.28);
  --text:#f0eeff;--t2:#8880bb;--t3:#3d3960;
  --r:12px;--r2:16px;--r3:20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);}

/* ═══════════ LOGIN ═══════════ */
#loginPage{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;}
.login-box{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r3);padding:40px;max-width:420px;width:90%;position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ac),var(--cyan),var(--rose));}
.login-gem{width:70px;height:70px;border-radius:22px;background:linear-gradient(135deg,#2a1daa,#6c63ff);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#fff;margin:0 auto 24px;box-shadow:0 0 50px var(--glow);}
.login-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--text),var(--ac3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:28px;}
.login-field{margin-bottom:16px;}
.login-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.07em;font-weight:600;margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;font-size:14px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;transition:border-color 0.2s;}
.login-input:focus{border-color:var(--ac);}
.login-btn{width:100%;background:linear-gradient(135deg,#3a2bcc,var(--ac));border:none;color:#fff;padding:14px;border-radius:var(--r2);font-size:15px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 24px var(--glow);margin-top:8px;}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 32px var(--glow);}
.login-error{color:var(--rose);font-size:12px;text-align:center;margin-top:12px;display:none;}

/* ═══════════ APP SHELL ═══════════ */
#app{display:none;height:100vh;}
#appInner{display:flex;height:100%;}

/* SIDEBAR */
#sidebar{width:60px;flex-shrink:0;background:rgba(10,10,16,0.95);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;overflow-y:auto;overflow-x:hidden;transition:width 0.3s;}
#sidebar.expanded{width:220px;}
#sidebar::-webkit-scrollbar{width:0;}

.sb-logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3a2bcc,#6c63ff);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:12px;font-weight:800;color:#fff;cursor:pointer;margin-bottom:8px;flex-shrink:0;box-shadow:0 0 20px var(--glow);}
.sb-sep{width:28px;height:1px;background:var(--border);margin:4px 0;flex-shrink:0;}

.sb-btn{width:44px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;position:relative;flex-shrink:0;font-size:16px;gap:10px;overflow:hidden;white-space:nowrap;}
.sb-btn:hover{background:var(--glow2);}
.sb-btn.active{background:linear-gradient(135deg,rgba(108,99,255,0.2),rgba(108,99,255,0.08));box-shadow:inset 0 0 0 1px var(--border2);}
.sb-btn .sb-label{display:none;font-size:12px;font-weight:500;color:var(--t2);}
#sidebar.expanded .sb-btn{width:200px;justify-content:flex-start;padding-left:14px;}
#sidebar.expanded .sb-btn .sb-label{display:inline;}
.sb-btn .sb-tip{position:absolute;left:52px;background:var(--s3);border:1px solid var(--border2);color:var(--text);font-size:11px;padding:5px 10px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s;z-index:10;}
#sidebar:not(.expanded) .sb-btn:hover .sb-tip{opacity:1;}

.sb-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:2px;}
.sb-user{width:32px;height:32px;border-radius:10px;background:var(--s3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ac2);cursor:pointer;margin-top:8px;}

/* MAIN CONTENT */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{padding:0 24px;height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:rgba(10,10,16,0.8);flex-shrink:0;}
#topbarTitle{font-size:15px;font-weight:600;flex:1;}
#topbarUser{font-size:12px;color:var(--t2);}
#topbarLogout{background:none;border:1px solid var(--border);color:var(--t2);padding:5px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;}
#topbarLogout:hover{border-color:var(--rose);color:var(--rose);}

#content{flex:1;overflow-y:auto;padding:24px;}
#content::-webkit-scrollbar{width:4px;}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* MODULE PLACEHOLDER */
.mod-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;padding:40px;}
.mod-placeholder .mod-icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
.mod-placeholder .mod-name{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px;}
.mod-placeholder .mod-desc{font-size:13px;color:var(--t3);max-width:400px;line-height:1.6;}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{width:50px;}
  #sidebar.expanded{width:200px;}
  .sb-btn{width:38px;height:36px;font-size:14px;}
  #content{padding:16px;}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-gem">AR</div>
    <div class="login-title">ARIA</div>
    <div class="login-sub">Mairie de Ferrières-en-Brie · Plateforme municipale</div>
    <div class="login-field">
      <label class="login-label">Identifiant</label>
      <input class="login-input" id="loginUser" placeholder="Votre identifiant" autocomplete="off">
    </div>
    <div class="login-field">
      <label class="login-label">Mot de passe</label>
      <input class="login-input" id="loginPass" type="password" placeholder="Mot de passe">
    </div>
    <button class="login-btn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="loginError">Identifiant ou mot de passe incorrect</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="appInner">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sb-logo" onclick="document.getElementById('sidebar').classList.toggle('expanded')">AR</div>
      <div class="sb-sep"></div>
      <div id="sbModules"></div>
      <div class="sb-bottom">
        <div class="sb-sep"></div>
        <div class="sb-btn" onclick="openMod('m17')">⚙️<span class="sb-label">Administration</span><span class="sb-tip">Administration</span></div>
        <div class="sb-user" id="sbUserAvatar" onclick="doLogout()"></div>
      </div>
    </div>
    <!-- MAIN -->
    <div id="main">
      <div id="topbar">
        <div id="topbarTitle">Dashboard</div>
        <div id="topbarUser"></div>
        <button id="topbarLogout" onclick="doLogout()">Déconnexion</button>
      </div>
      <div id="content"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://ffxutyfmnlkevketnmuc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_in69243kt4AuXGdUYw8gfg_c7oL-1e5';
let sb = null;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) { console.warn('Supabase non disponible, mode local'); }

// ═══════════════════════════════════════════
// MODULES DEFINITION
// ═══════════════════════════════════════════
const MODULES = [
  {id:'m01', icon:'🍽', name:'Périscolaire & repas', desc:'Effectifs, commandes traiteur, régimes alimentaires'},
  {id:'m02', icon:'📋', name:'Traçabilité cantine', desc:'Étiquettes, bons de livraison, menus, pertes'},
  {id:'m03', icon:'✏️', name:'Modifications & présences', desc:'Ajouts/annulations, présences temps réel, absences'},
  {id:'m04', icon:'👨‍👩‍👧‍👦', name:'Familles & enfants', desc:'Dossiers, fiches sanitaires, contacts urgence'},
  {id:'m05', icon:'💳', name:'Suivi impayés', desc:'Soldes, relances, plans apurement'},
  {id:'m06', icon:'📝', name:'Inscriptions scolaires', desc:'Nouveaux dossiers, suivi documents'},
  {id:'m07', icon:'🎄', name:'Noël des enfants', desc:'Base 0-7 ans, commandes cadeaux'},
  {id:'m08', icon:'🚇', name:'Imagine\'R', desc:'Subvention transport, suivi cartes'},
  {id:'m09', icon:'🎓', name:'Récompense bacheliers', desc:'Mentions, cartes cadeaux'},
  {id:'m10', icon:'🏖', name:'Vacances / ALSH', desc:'Planning, ratios, sorties, pique-niques'},
  {id:'m11', icon:'🏠', name:'Salle des jeunes', desc:'Adhérents, activités, réservations'},
  {id:'m12', icon:'💰', name:'Régie', desc:'Régie avance, recettes, demandes CB'},
  {id:'m13', icon:'📊', name:'Budget directeurs', desc:'Budget annuel, dépenses, bilan'},
  {id:'m14', icon:'🎪', name:'Événements', desc:'Manifestations, commissions, logistique'},
  {id:'m15', icon:'📌', name:'Todo & rappels', desc:'Listes de tâches par utilisateur'},
  {id:'m16', icon:'📈', name:'Dashboard élus', desc:'Synthèse lecture seule'},
  {id:'m17', icon:'⚙️', name:'Administration', desc:'Gestion accès et profils', adminOnly:true},
];

// ═══════════════════════════════════════════
// PROFILS & ACCÈS
// ═══════════════════════════════════════════
const PROFILES = {
  kamelia:    {nom:'Kamelia', role:'admin', modules:MODULES.map(m=>m.id)},
  dir_mat:    {nom:'Directrice Maternelle', role:'directeur', modules:['m01','m03','m04','m10','m13','m14','m15']},
  dir_elem:   {nom:'Directeur Élémentaire', role:'directeur', modules:['m01','m03','m04','m10','m13','m14','m15']},
  dir_adj:    {nom:'Directeur Adjoint', role:'directeur', modules:['m01','m03','m04','m10','m13','m14','m15']},
  resp_cantine:{nom:'Resp. Cantine', role:'cantine', modules:['m01','m02']},
  resp_jeunes: {nom:'Resp. Salle des jeunes', role:'jeunes', modules:['m11','m14']},
  dgs:        {nom:'DGS', role:'elu', modules:MODULES.filter(m=>m.id!=='m17').map(m=>m.id)},
  elu:        {nom:'Élu', role:'elu', modules:MODULES.filter(m=>m.id!=='m17').map(m=>m.id)},
};

// Mots de passe temporaires (en production → Supabase Auth)
const PASSWORDS = {kamelia:'aria2025',dir_mat:'dir2025',dir_elem:'dir2025',dir_adj:'dir2025',resp_cantine:'cantine2025',resp_jeunes:'jeunes2025',dgs:'dgs2025',elu:'elu2025'};

let currentUser = null;
let currentModule = null;

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
function doLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  if (PASSWORDS[user] && PASSWORDS[user] === pass) {
    currentUser = {id:user, ...PROFILES[user]};
    localStorage.setItem('aria-session', JSON.stringify(currentUser));
    showApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem('aria-session');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').style.display = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbarUser').textContent = currentUser.nom + ' · ' + currentUser.role;
  document.getElementById('sbUserAvatar').textContent = currentUser.nom.substring(0,2).toUpperCase();
  buildSidebar();
  openMod(currentUser.modules[0]);
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function buildSidebar() {
  const el = document.getElementById('sbModules');
  el.innerHTML = '';
  MODULES.forEach(m => {
    if (!currentUser.modules.includes(m.id)) return;
    if (m.adminOnly && currentUser.role !== 'admin') return;
    const btn = document.createElement('div');
    btn.className = 'sb-btn';
    btn.setAttribute('data-mod', m.id);
    btn.innerHTML = `${m.icon}<span class="sb-label">${m.name}</span><span class="sb-tip">${m.name}</span>`;
    btn.onclick = () => openMod(m.id);
    el.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// MODULE ROUTING
// ═══════════════════════════════════════════
function openMod(id) {
  currentModule = id;
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sb-btn[data-mod="${id}"]`)?.classList.add('active');
  const mod = MODULES.find(m => m.id === id);
  document.getElementById('topbarTitle').textContent = mod ? mod.icon + ' ' + mod.name : id;

  const content = document.getElementById('content');
  const isReadOnly = currentUser.role === 'elu';

  // Route to module render
  switch(id) {
    case 'm03': content.innerHTML = renderM03(); break;
    default:
      content.innerHTML = `<div class="mod-placeholder">
        <div class="mod-icon">${mod?.icon||'📦'}</div>
        <div class="mod-name">${mod?.name||id}</div>
        <div class="mod-desc">${mod?.desc||''}</div>
        <div style="margin-top:16px;font-size:12px;color:var(--t3);">Module en cours de développement</div>
      </div>`;
  }
}

// ═══════════════════════════════════════════
// MODULE 03 — MODIFICATIONS & PRÉSENCES
// ═══════════════════════════════════════════
function renderM03() {
  return `
  <div style="font-size:24px;font-weight:700;margin-bottom:4px;">Modifications & Présences</div>
  <div style="font-size:13px;color:var(--t2);margin-bottom:20px;">Saisie rapide des ajouts/annulations et suivi des présences en temps réel</div>
  <div style="color:var(--t3);text-align:center;padding:40px;">Module 03 en construction — prochaine étape</div>`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPass').focus(); });

// Auto-login si session existante
const saved = localStorage.getItem('aria-session');
if (saved) { try { currentUser = JSON.parse(saved); showApp(); } catch(e) {} }
</script>
</body>
</html>
